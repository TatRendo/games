<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Narrativo</title>
  <!-- ✅ Bloquea el zoom y adapta al ancho del celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">

    <!-- Pantalla 1: bienvenida -->
    <div id="welcome-screen">
      <img src="assets/bienvenidos.png" alt="Bienvenida" id="intro-image">
      <button id="start-button" onclick="startGame()">Iniciar</button>
    </div>

    <!-- Pantalla 2: ingresar nombre -->
    <div id="name-screen" class="hidden">
      <h2>Ingresa tu nombre para comenzar</h2>
      <input type="text" id="player-name" placeholder="Tu nombre">
      <button onclick="beginQuestions()">Comenzar</button>
    </div>

    <!-- Pantallas de las preguntas -->
    <div id="question-screen" class="hidden">
      <div id="character">
        <img id="character-img" src="assets/milogo.png" alt="Personaje">
        <p id="dialogue"></p>
      </div>
      <div id="options"></div>
    </div>

    <!-- Pantalla final -->
    <div id="end-screen" class="hidden">
      <h2 id="final-message"></h2>
      <p id="score"></p>
    </div>

  </div>

  <!-- ✅ Carga el script al final del body -->
  <<script src="GAMES/script.js"></script>
</body>
</html>
